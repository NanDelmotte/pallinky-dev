# Path: apps/mobile/fly.toml
# Description: Deployment configuration for Fly.io.

app = "pallinky-prod"
primary_region = "ams"

[experimental]
entrypoint = ["node", "server.js"]

[http_service]
internal_port = 3000
force_https = true
auto_stop_machines = true
auto_start_machines = true
min_machines_running = 0
processes = ["app"]

[[vm]]
size = "shared-cpu-1x"